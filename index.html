<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Ture App</title>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(14, 165, 233, 0.22), transparent 30%),
        radial-gradient(circle at top right, rgba(132, 204, 22, 0.16), transparent 28%),
        linear-gradient(180deg, #020617 0%, #0f172a 48%, #020617 100%);
      color: #e5e7eb;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 18px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 16px 0 2px;
    }

    .top-bar h1 {
      margin: 0;
      font-size: 25px;
      color: #f8fafc;
      letter-spacing: 0;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark::before {
      content: "";
      width: 12px;
      height: 34px;
      border-radius: 999px;
      background: linear-gradient(180deg, #38bdf8, #84cc16);
      box-shadow: 0 0 18px rgba(56, 189, 248, 0.38);
    }

    .card {
      position: relative;
      overflow: hidden;
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(186, 230, 253, 0.18);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 16px 35px rgba(2, 6, 23, 0.28);
      backdrop-filter: blur(14px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.14;
      pointer-events: none;
    }

    .card > * {
      position: relative;
      z-index: 1;
    }

    h2 { font-size: 19px; margin-top: 0; margin-bottom: 14px; }
    h3 { font-size: 16px; margin-top: 18px; margin-bottom: 10px; }

    input, select {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(186, 230, 253, 0.22);
      background: rgba(2, 6, 23, 0.68);
      color: #fff;
      font-size: 16px;
      margin-bottom: 12px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.16);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #0284c7, #16a34a);
      margin-top: 6px;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(2, 132, 199, 0.18);
    }

    .login-small {
      width: auto;
      padding: 10px 16px;
      font-size: 14px;
      margin: 0;
    }

    .secondary { background: rgba(51, 65, 85, 0.88); }
    .green { background: linear-gradient(135deg, #16a34a, #0f766e); }
    .orange { background: linear-gradient(135deg, #ea580c, #ca8a04); }
    .logout, .delete-btn { background: linear-gradient(135deg, #dc2626, #991b1b); }
    .edit-btn { background: linear-gradient(135deg, #ca8a04, #854d0e); }

    .hidden { display: none; }

    .week-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    .week-bar button {
      flex: 1;
      padding: 11px;
      font-size: 14px;
      background: rgba(2, 6, 23, 0.58);
      border: 1px solid rgba(186, 230, 253, 0.2);
      box-shadow: none;
    }

    .week-label {
      text-align: center;
      font-size: 14px;
      color: #bae6fd;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .daily-card, .weekly-card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #082f49 0%, #111827 48%, #14532d 100%);
      border: 1px solid #0ea5e9;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 16px 35px rgba(14, 165, 233, 0.18);
    }

    .weekly-card {
      background: linear-gradient(135deg, #083344 0%, #111827 48%, #365314 100%);
    }

    .daily-card::before, .weekly-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.16;
      pointer-events: none;
    }

    .daily-content, .weekly-content {
      position: relative;
      z-index: 1;
    }

    .daily-header, .weekly-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .daily-title, .weekly-title {
      margin: 0;
      font-size: 18px;
      color: #f8fafc;
    }

    .daily-date {
      margin-top: 4px;
      color: #bae6fd;
      font-size: 13px;
      font-weight: bold;
    }

    .day-nav {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .day-nav button {
      width: 42px;
      height: 42px;
      margin: 0;
      padding: 0;
      border-radius: 50%;
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(186, 230, 253, 0.45);
      font-size: 22px;
      line-height: 1;
    }

    .daily-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .daily-metric {
      background: rgba(2, 6, 23, 0.55);
      border: 1px solid rgba(226, 232, 240, 0.13);
      border-radius: 14px;
      padding: 12px;
    }

    .daily-metric span {
      display: block;
      color: #bae6fd;
      font-size: 12px;
      margin-bottom: 5px;
    }

    .daily-metric strong {
      display: block;
      color: #fff;
      font-size: 18px;
      overflow-wrap: anywhere;
    }

    .daily-list {
      display: grid;
      gap: 8px;
    }

    .daily-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      background: rgba(2, 6, 23, 0.5);
      border: 1px solid rgba(226, 232, 240, 0.12);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .daily-company {
      min-width: 0;
      color: #f8fafc;
      font-weight: bold;
      overflow-wrap: anywhere;
    }

    .daily-numbers {
      color: #d9f99d;
      font-size: 13px;
      font-weight: bold;
      text-align: right;
      white-space: nowrap;
    }

    .weekly-card .tour-item {
      background: rgba(2, 6, 23, 0.5);
      border: 1px solid rgba(226, 232, 240, 0.12);
      border-radius: 12px;
    }

    .weekly-card .company-details {
      border-top: 1px solid rgba(186, 230, 253, 0.22);
    }

    .weekly-card .day-row {
      border-bottom: 1px solid rgba(186, 230, 253, 0.16);
    }

    .weekly-card .total-box {
      background: rgba(2, 6, 23, 0.55);
      border: 1px solid rgba(217, 249, 157, 0.35);
      color: #d9f99d;
    }

    .nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .tour-item, .company-item {
      background: rgba(2, 6, 23, 0.5);
      border: 1px solid rgba(226, 232, 240, 0.12);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .tour-company {
      font-size: 17px;
      font-weight: bold;
      color: #facc15;
    }

    .tour-details {
      font-size: 14px;
      color: #cbd5e1;
      margin-top: 6px;
      line-height: 1.5;
    }

    .company-details {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(186, 230, 253, 0.22);
    }

    .day-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: space-between;
      align-items: stretch;
      padding: 10px 0;
      border-bottom: 1px solid rgba(186, 230, 253, 0.16);
      color: #cbd5e1;
      font-size: 14px;
    }

    .day-head {
      width: 100%;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .day-head strong { color: white; }

    .admin-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .admin-actions button {
      padding: 10px;
      font-size: 14px;
      margin: 0;
    }

    .total-box {
      background: rgba(2, 6, 23, 0.55);
      border: 1px solid rgba(217, 249, 157, 0.35);
      color: #d9f99d;
      border-radius: 14px;
      padding: 14px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      margin-top: 12px;
    }

    .small-text {
      font-size: 13px;
      color: #94a3b8;
      text-align: center;
    }

    .status-box {
      background: rgba(2, 6, 23, 0.55);
      border: 1px solid rgba(186, 230, 253, 0.16);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 12px;
      color: #cbd5e1;
      font-size: 14px;
      text-align: center;
    }

    .clickable { cursor: pointer; }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-header h2 {
      margin: 0;
      min-width: 0;
    }

    @media (max-width: 390px) {
      .app {
        max-width: 100%;
        padding: 12px max(12px, env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
      }

      .top-bar {
        margin-bottom: 12px;
        padding-top: 10px;
      }

      .top-bar h1 {
        font-size: 22px;
      }

      .brand-mark {
        gap: 8px;
      }

      .brand-mark::before {
        width: 10px;
        height: 30px;
      }

      .card,
      .daily-card,
      .weekly-card {
        border-radius: 14px;
        margin-bottom: 12px;
        padding: 14px;
      }

      h2 {
        font-size: 17px;
      }

      input,
      select,
      button {
        border-radius: 10px;
        padding: 12px;
      }

      .login-small {
        padding: 9px 12px;
        font-size: 13px;
      }

      .week-bar,
      .nav,
      .daily-summary,
      .admin-actions {
        gap: 8px;
      }

      .week-bar button {
        padding: 10px 8px;
        font-size: 13px;
      }

      .nav {
        grid-template-columns: 1fr;
      }

      .section-header {
        align-items: flex-start;
      }

      .section-header h2 {
        font-size: 17px;
        line-height: 1.25;
      }

      .daily-header {
        align-items: flex-start;
        gap: 10px;
      }

      .daily-title,
      .weekly-title {
        font-size: 17px;
        line-height: 1.25;
      }

      .daily-date {
        font-size: 12px;
      }

      .day-nav {
        gap: 6px;
      }

      .day-nav button {
        width: 36px;
        height: 36px;
        font-size: 20px;
      }

      .daily-metric {
        border-radius: 12px;
        padding: 10px;
      }

      .daily-metric strong {
        font-size: 16px;
      }

      .daily-row {
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 10px;
      }

      .daily-numbers {
        text-align: left;
        white-space: normal;
      }

      .day-head {
        flex-direction: column;
        gap: 4px;
      }

      .day-head strong {
        overflow-wrap: anywhere;
      }

      .total-box {
        font-size: 16px;
        padding: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="top-bar">
      <h1 class="brand-mark">Ture App</h1>
      <button id="loginBtn" class="login-small" onclick="openLogin()">Login</button>
      <button id="logoutBtn" class="login-small logout hidden" onclick="logout()">Logout</button>
    </div>

    <div id="loginBox" class="card hidden">
      <h2>Admin login</h2>
      <input id="username" placeholder="Username" />
      <input id="password" type="password" placeholder="Password" />
      <button onclick="login()">Login</button>
    </div>

    <div id="adminButtons" class="card hidden">
      <div class="nav">
        <button class="green" onclick="showSection('companySection')">Dodaj kompaniju</button>
        <button class="orange" onclick="showSection('tourSection')">Unos / izmena tura</button>
      </div>
    </div>

    <div id="companySection" class="card hidden">
      <div class="section-header">
        <h2>Dodaj kompaniju</h2>
        <button class="login-small secondary" onclick="closeSection('companySection')">Zatvori</button>
      </div>
      <input id="companyName" placeholder="Naziv kompanije" />
      <button onclick="addCompany()">Sačuvaj kompaniju</button>

      <h3>Postojeće kompanije</h3>
      <div id="companyList"></div>
    </div>

    <div id="tourSection" class="card hidden">
      <div class="section-header">
        <h2 id="tourFormTitle">Unos / izmena tura</h2>
        <button class="login-small secondary" onclick="closeSection('tourSection')">Zatvori</button>
      </div>

      <div id="formStatus" class="status-box">
        Izaberite kompaniju i datum. Ako postoji tura za taj dan, biće automatski učitana.
      </div>

      <input id="editRow" type="hidden" />

      <select id="tourCompany" onchange="findTourForSelectedDate()"></select>
      <input id="tourDate" type="date" onchange="findTourForSelectedDate()" />
      <input id="tourCount" type="number" placeholder="Broj tura" />
      <input id="tourPrice" type="number" placeholder="Cena po turi u dinarima" />

      <button id="saveTourBtn" onclick="saveTour()">Sačuvaj turu</button>
      <button id="deleteSelectedBtn" class="delete-btn hidden" onclick="deleteSelectedTour()">Obriši izabranu turu</button>
      <button id="cancelEditBtn" class="secondary hidden" onclick="cancelEdit()">Otkaži izmenu</button>
    </div>

    <div class="daily-card">
      <div class="daily-content">
        <div class="daily-header">
          <div>
            <h2 class="daily-title">Dnevni pregled tura</h2>
            <div id="dailyDateLabel" class="daily-date"></div>
          </div>
          <div class="day-nav">
            <button onclick="changeDay(-1)" aria-label="Prethodni dan">&lsaquo;</button>
            <button onclick="changeDay(1)" aria-label="Sledeći dan">&rsaquo;</button>
          </div>
        </div>

        <div class="daily-summary">
          <div class="daily-metric">
            <span>Ukupno tura</span>
            <strong id="dailyTotalTours">0</strong>
          </div>
          <div class="daily-metric">
            <span>Ukupno RSD</span>
            <strong id="dailyTotalRsd">0 RSD</strong>
          </div>
        </div>

        <div id="dailyTourList" class="daily-list"></div>
      </div>
    </div>

    <div class="weekly-card">
      <div class="weekly-content">
        <div class="week-bar">
          <button class="secondary" onclick="changeWeek(-1)">Prethodna</button>
          <button class="secondary" onclick="changeWeek(1)">Sledeća</button>
        </div>
        <div id="weekLabel" class="week-label"></div>
        <div class="weekly-header">
          <h2 class="weekly-title">Pregled tura</h2>
        </div>
        <div id="tourList"></div>
        <div id="totalBox" class="total-box">Ukupno tura: 0<br>Ukupno RSD: 0 RSD</div>
      </div>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx8NayFQk1zsnIiLCcFDSDmJGuXTZUcL8R1kq_usEwVEkrDwy50QTjo6JDXFibYvIFI/exec";

    let weekOffset = 0;
    let loggedIn = localStorage.getItem("loggedIn") === "yes";
    let currentTours = [];
    let savingTour = false;
    let selectedDay = "";

    document.addEventListener("DOMContentLoaded", () => {
      selectedDay = todayDate();
      updateLoginView();
      loadData();
    });

    function money(value) {
      return `${Number(value || 0).toLocaleString("sr-RS")} RSD`;
    }

    function getTourRow(tour) {
      if (!tour) return "";

      return tour.row ||
        tour.Row ||
        tour.rowNumber ||
        tour.row_number ||
        tour.rowIndex ||
        tour.sheetRow ||
        tour.red ||
        tour.brojReda ||
        tour._row ||
        "";
    }

    function findExistingTour(company, date) {
      return currentTours.find(t =>
        String(t.company).trim().toLowerCase() === String(company).trim().toLowerCase() &&
        String(t.date).trim() === String(date).trim()
      );
    }

    function updateTotalBox(tours, total) {
      document.getElementById("totalBox").innerHTML =
        `Ukupno tura: ${Number(tours || 0).toLocaleString("sr-RS")}<br>Ukupno RSD: ${money(total)}`;
    }

    function renderDailyOverview(tours, date) {
      const dailyTours = tours || [];
      const list = document.getElementById("dailyTourList");
      let totalTours = 0;
      let total = 0;

      document.getElementById("dailyDateLabel").innerText = formatDisplayDate(date || selectedDay);
      list.innerHTML = "";

      if (dailyTours.length === 0) {
        document.getElementById("dailyTotalTours").innerText = "0";
        document.getElementById("dailyTotalRsd").innerText = money(0);
        list.innerHTML = `<p class="small-text">Nema unetih tura za ovaj dan.</p>`;
        return;
      }

      const grouped = {};

      dailyTours.forEach(t => {
        const company = t.company || "Bez kompanije";

        if (!grouped[company]) {
          grouped[company] = {
            company: company,
            tours: 0,
            total: 0
          };
        }

        grouped[company].tours += Number(t.tours || 0);
        grouped[company].total += Number(t.total || 0);
      });

      Object.values(grouped)
        .sort((a, b) => Number(b.tours || 0) - Number(a.tours || 0))
        .forEach(item => {
          totalTours += item.tours;
          total += item.total;

          list.innerHTML += `
            <div class="daily-row">
              <div class="daily-company">${escapeHtml(item.company)}</div>
              <div class="daily-numbers">${Number(item.tours || 0).toLocaleString("sr-RS")} tura<br>${money(item.total)}</div>
            </div>
          `;
        });

      document.getElementById("dailyTotalTours").innerText = Number(totalTours || 0).toLocaleString("sr-RS");
      document.getElementById("dailyTotalRsd").innerText = money(total);
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function requestJson(url, options = {}, attempts = 3) {
      let lastError;

      for (let attempt = 1; attempt <= attempts; attempt++) {
        try {
          const res = await fetch(url, {
            ...options,
            cache: "no-store",
            headers: {
              "Content-Type": "text/plain;charset=utf-8",
              ...(options.headers || {})
            }
          });

          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }

          return await res.json();
        } catch (err) {
          lastError = err;
          if (attempt < attempts) {
            await sleep(600 * attempt);
          }
        }
      }

      throw lastError;
    }

    function setSaveTourBusy(isBusy) {
      savingTour = isBusy;

      const button = document.getElementById("saveTourBtn");
      if (!button) return;

      button.disabled = isBusy;
      button.style.opacity = isBusy ? "0.7" : "";
      button.innerText = isBusy ? "Šaljem..." : (document.getElementById("editRow").value ? "Sačuvaj izmenu" : "Sačuvaj novu turu");
    }

    function openLogin() {
      document.getElementById("loginBox").classList.toggle("hidden");
    }

    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        alert("Unesite username i password");
        return;
      }

      try {
        const data = await requestJson(`${API_URL}?action=login&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&v=${Date.now()}`);

        if (data.success) {
          localStorage.setItem("loggedIn", "yes");
          loggedIn = true;
          document.getElementById("loginBox").classList.add("hidden");
          updateLoginView();
          loadData();
        } else {
          alert(data.message || "Login nije uspeo");
        }
      } catch (err) {
        alert("Greška pri loginu: " + err.message);
      }
    }

    function logout() {
      localStorage.removeItem("loggedIn");
      loggedIn = false;

      document.getElementById("companySection").classList.add("hidden");
      document.getElementById("tourSection").classList.add("hidden");

      cancelEdit();
      updateLoginView();
      loadData();
    }

    function updateLoginView() {
      if (loggedIn) {
        document.getElementById("loginBtn").classList.add("hidden");
        document.getElementById("logoutBtn").classList.remove("hidden");
        document.getElementById("adminButtons").classList.remove("hidden");
      } else {
        document.getElementById("loginBtn").classList.remove("hidden");
        document.getElementById("logoutBtn").classList.add("hidden");
        document.getElementById("adminButtons").classList.add("hidden");
      }
    }

    function showSection(id) {
      document.getElementById("companySection").classList.add("hidden");
      document.getElementById("tourSection").classList.add("hidden");
      document.getElementById(id).classList.remove("hidden");

      if (id === "tourSection") {
        if (!document.getElementById("tourDate").value) {
          document.getElementById("tourDate").value = todayDate();
        }
        findTourForSelectedDate();
      }
    }

    function closeSection(id) {
      document.getElementById(id).classList.add("hidden");
      if (id === "tourSection") {
        cancelEdit();
      }
    }

    function todayDate() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function addDaysToDateString(dateText, days) {
      const parts = String(dateText || todayDate()).split("-").map(Number);
      const date = new Date(parts[0], parts[1] - 1, parts[2] + days);
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function formatDisplayDate(dateText) {
      const parts = String(dateText || todayDate()).split("-").map(Number);
      const date = new Date(parts[0], parts[1] - 1, parts[2]);
      return date.toLocaleDateString("sr-RS", {
        weekday: "long",
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      });
    }

    async function addCompany() {
      if (!loggedIn) return alert("Morate biti ulogovani");

      const company = document.getElementById("companyName").value.trim();

      if (!company) {
        alert("Unesite naziv kompanije");
        return;
      }

      const exists = Array.from(document.getElementById("tourCompany").options)
        .some(option => option.value.toLowerCase() === company.toLowerCase());

      if (exists) {
        alert("Ova kompanija već postoji");
        return;
      }

      try {
        const data = await requestJson(API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "addCompany",
            company: company
          })
        });

        if (data.success) {
          document.getElementById("companyName").value = "";
          alert("Kompanija je sačuvana");
          loadData();
        } else {
          alert("Greška: " + data.message);
        }

      } catch (err) {
        alert("Greška pri čuvanju: " + err.message);
      }
    }

    function findTourForSelectedDate() {
      if (!loggedIn) return;

      const company = document.getElementById("tourCompany").value;
      const date = document.getElementById("tourDate").value;

      if (!company || !date) return;

      const found = findExistingTour(company, date);

      if (found) {
        document.getElementById("editRow").value = getTourRow(found);
        document.getElementById("tourCount").value = found.tours || "";
        document.getElementById("tourPrice").value = found.price || "";

        document.getElementById("tourFormTitle").innerText = "Izmena postojeće ture";
        document.getElementById("saveTourBtn").innerText = "Sačuvaj izmenu";
        document.getElementById("cancelEditBtn").classList.remove("hidden");
        document.getElementById("deleteSelectedBtn").classList.remove("hidden");
        document.getElementById("formStatus").innerText = "Pronađena je postojeća tura za izabrani datum. Možete je izmeniti.";
      } else {
        document.getElementById("editRow").value = "";
        document.getElementById("tourCount").value = "";
        document.getElementById("tourPrice").value = "";

        document.getElementById("tourFormTitle").innerText = "Unos nove ture";
        document.getElementById("saveTourBtn").innerText = "Sačuvaj novu turu";
        document.getElementById("cancelEditBtn").classList.add("hidden");
        document.getElementById("deleteSelectedBtn").classList.add("hidden");
        document.getElementById("formStatus").innerText = "Nema ture za izabrani datum. Možete uneti novu.";
      }
    }

    async function saveTour() {
      if (!loggedIn) return alert("Morate biti ulogovani");
      if (savingTour) return;

      const company = document.getElementById("tourCompany").value;
      const date = document.getElementById("tourDate").value;
      const tours = document.getElementById("tourCount").value;
      const price = document.getElementById("tourPrice").value;
      const existingTour = findExistingTour(company, date);
      const editRow = document.getElementById("editRow").value || getTourRow(existingTour);

      if (!company || !date || !tours || price === "") {
        alert("Popunite kompaniju, datum, broj tura i cenu");
        return;
      }

      if (existingTour && !editRow) {
        alert("Postojeća tura je pronađena, ali ne može da se izmeni jer server nije vratio broj reda.");
        return;
      }

      const action = editRow ? "updateTour" : "addTour";

      try {
        setSaveTourBusy(true);

        const data = await requestJson(API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: action,
            row: editRow,
            company: company,
            date: date,
            tours: tours,
            price: price
          })
        });

        if (data.success) {
          alert(editRow ? "Tura je izmenjena" : "Tura je sačuvana");
          await loadData();
          findTourForSelectedDate();
        } else {
          alert("Greška: " + data.message);
        }

      } catch (err) {
        alert("Greška pri čuvanju ture: " + err.message);
      } finally {
        setSaveTourBusy(false);
      }
    }

    function startEditTour(row, company, date, tours, price) {
      if (!loggedIn) return alert("Morate biti ulogovani");

      showSection("tourSection");

      document.getElementById("editRow").value = row;
      document.getElementById("tourCompany").value = company;
      document.getElementById("tourDate").value = date;
      document.getElementById("tourCount").value = tours;
      document.getElementById("tourPrice").value = price;

      document.getElementById("tourFormTitle").innerText = "Izmena postojeće ture";
      document.getElementById("saveTourBtn").innerText = "Sačuvaj izmenu";
      document.getElementById("cancelEditBtn").classList.remove("hidden");
      document.getElementById("deleteSelectedBtn").classList.remove("hidden");
      document.getElementById("formStatus").innerText = "Menjate izabranu turu.";

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function cancelEdit() {
      document.getElementById("editRow").value = "";
      document.getElementById("tourCount").value = "";
      document.getElementById("tourPrice").value = "";

      document.getElementById("tourFormTitle").innerText = "Unos / izmena tura";
      document.getElementById("saveTourBtn").innerText = "Sačuvaj turu";
      document.getElementById("cancelEditBtn").classList.add("hidden");
      document.getElementById("deleteSelectedBtn").classList.add("hidden");
      document.getElementById("formStatus").innerText = "Izaberite kompaniju i datum. Ako postoji tura za taj dan, biće automatski učitana.";
    }

    async function deleteSelectedTour() {
      const row = document.getElementById("editRow").value;
      if (!row) return alert("Nema izabrane ture za brisanje");
      await deleteTour(row);
    }

    async function deleteTour(row) {
      if (!loggedIn) return alert("Morate biti ulogovani");

      if (!confirm("Da li ste sigurni da želite da obrišete ovu turu?")) return;

      try {
        const data = await requestJson(API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "deleteTour",
            row: row
          })
        });

        if (data.success) {
          alert("Tura je obrisana");
          await loadData();
          cancelEdit();
        } else {
          alert("Greška: " + data.message);
        }

      } catch (err) {
        alert("Greška pri brisanju: " + err.message);
      }
    }

    async function loadData() {
      try {
        const data = await requestJson(`${API_URL}?action=getData&weekOffset=${weekOffset}&dailyDate=${encodeURIComponent(selectedDay)}&v=${Date.now()}`);

        if (!data.success) {
          alert("Greška: " + data.message);
          return;
        }

        currentTours = data.tours || [];
        renderDailyOverview(data.dailyTours || [], data.dailyDate || selectedDay);

        document.getElementById("weekLabel").innerText =
          `${data.weekStart} do ${data.weekEnd}`;

        const select = document.getElementById("tourCompany");
        select.innerHTML = "";

        data.companies.forEach(company => {
          if (company) {
            const option = document.createElement("option");
            option.value = company;
            option.textContent = company;
            select.appendChild(option);
          }
        });

        const companyList = document.getElementById("companyList");
        if (companyList) {
          companyList.innerHTML = "";

          if (data.companies.length === 0) {
            companyList.innerHTML = `<p class="small-text">Nema unetih kompanija.</p>`;
          }

          data.companies.forEach(company => {
            companyList.innerHTML += `<div class="company-item">${escapeHtml(company)}</div>`;
          });
        }

        const list = document.getElementById("tourList");
        list.innerHTML = "";

        let totalTours = 0;
        let total = 0;

        if (!data.tours || data.tours.length === 0) {
          list.innerHTML = `<p class="small-text">Nema unetih tura za ovu nedelju.</p>`;
          updateTotalBox(0, 0);
          return;
        }

        const grouped = {};

        data.tours.forEach(t => {
          const company = t.company;
          const date = t.date || "Bez datuma";

          if (!grouped[company]) {
            grouped[company] = {
              company: company,
              tours: 0,
              total: 0,
              days: {}
            };
          }

          grouped[company].tours += Number(t.tours || 0);
          grouped[company].total += Number(t.total || 0);

          if (!grouped[company].days[date]) {
            grouped[company].days[date] = [];
          }

          grouped[company].days[date].push(t);
        });

        Object.values(grouped)
          .sort((a, b) => Number(b.tours || 0) - Number(a.tours || 0))
          .forEach((companyData, index) => {
          totalTours += Number(companyData.tours || 0);
          total += Number(companyData.total || 0);

          let daysHtml = "";

          Object.keys(companyData.days).sort().forEach(day => {
            let dayTours = 0;
            let dayTotal = 0;
            let actionHtml = "";

            companyData.days[day].forEach(t => {
              dayTours += Number(t.tours || 0);
              dayTotal += Number(t.total || 0);

              if (loggedIn) {
                const row = getTourRow(t);
                actionHtml += `
                  <div class="admin-actions">
                    <button class="edit-btn" onclick="event.stopPropagation(); startEditTour(${jsArg(row)}, ${jsArg(t.company)}, ${jsArg(t.date)}, ${jsArg(t.tours)}, ${jsArg(t.price)})">Izmeni</button>
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteTour(${jsArg(row)})">Obriši</button>
                  </div>
                `;
              }
            });

            daysHtml += `
              <div class="day-row">
                <div class="day-head">
                  <span>${escapeHtml(day)}</span>
                  <strong>${dayTours} tura / ${money(dayTotal)}</strong>
                </div>
                ${actionHtml}
              </div>
            `;
          });

          list.innerHTML += `
            <div class="tour-item clickable" onclick="toggleDetails('details-${index}')">
              <div class="tour-company">${escapeHtml(companyData.company)}</div>

              <div class="tour-details">
                Ukupan broj tura: ${companyData.tours}<br>
                Ukupno za kompaniju: ${money(companyData.total)}<br><br>
                <small>Kliknite za detalje ▼</small>
              </div>

              <div id="details-${index}" class="company-details hidden">
                ${daysHtml}
              </div>
            </div>
          `;
        });

        updateTotalBox(totalTours, total);

      } catch (err) {
        alert("Greška pri učitavanju: " + err.message);
      }
    }

    function toggleDetails(id) {
      document.getElementById(id).classList.toggle("hidden");
    }

    function changeWeek(direction) {
      weekOffset += direction;
      cancelEdit();
      loadData();
    }

    function changeDay(direction) {
      selectedDay = addDaysToDateString(selectedDay, direction);
      loadData();
    }

    function escapeText(text) {
      return String(text || "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/"/g, "&quot;");
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function jsArg(value) {
      return JSON.stringify(String(value ?? ""));
    }
  </script>
</body>
</html>
