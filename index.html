<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Ture App</title>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 18px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .top-bar h1 {
      margin: 0;
      font-size: 22px;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    h2 { font-size: 19px; margin-top: 0; margin-bottom: 14px; }
    h3 { font-size: 16px; margin-top: 18px; margin-bottom: 10px; }

    input, select {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #020617;
      color: #fff;
      font-size: 16px;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      background: #2563eb;
      margin-top: 6px;
      cursor: pointer;
    }

    .login-small {
      width: auto;
      padding: 10px 16px;
      font-size: 14px;
      margin: 0;
    }

    .secondary { background: #334155; }
    .green { background: #16a34a; }
    .orange { background: #ea580c; }
    .logout, .delete-btn { background: #dc2626; }
    .edit-btn { background: #ca8a04; }

    .hidden { display: none; }

    .week-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    .week-bar button {
      flex: 1;
      padding: 11px;
      font-size: 14px;
    }

    .week-label {
      text-align: center;
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 4px;
    }

    .nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .tour-item, .company-item {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .tour-company {
      font-size: 17px;
      font-weight: bold;
      color: #fff;
    }

    .tour-details {
      font-size: 14px;
      color: #cbd5e1;
      margin-top: 6px;
      line-height: 1.5;
    }

    .company-details {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #1e293b;
    }

    .day-row {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .day-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .day-head strong { color: white; }

    .admin-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .admin-actions button {
      padding: 10px;
      font-size: 14px;
      margin: 0;
    }

    .total-box {
      background: #052e16;
      border: 1px solid #16a34a;
      color: #bbf7d0;
      border-radius: 14px;
      padding: 14px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      margin-top: 12px;
    }

    .small-text {
      font-size: 13px;
      color: #94a3b8;
      text-align: center;
    }

    .status-box {
      background: #1e293b;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 12px;
      color: #cbd5e1;
      font-size: 14px;
      text-align: center;
    }

    .clickable { cursor: pointer; }
  </style>
</head>

<body>
  <div class="app">

    <div class="top-bar">
      <h1>Ture App</h1>
      <button id="loginBtn" class="login-small" onclick="openLogin()">Login</button>
      <button id="logoutBtn" class="login-small logout hidden" onclick="logout()">Logout</button>
    </div>

    <div id="loginBox" class="card hidden">
      <h2>Admin login</h2>
      <input id="username" placeholder="Username" />
      <input id="password" type="password" placeholder="Password" />
      <button onclick="login()">Login</button>
    </div>

    <div class="card">
      <div class="week-bar">
        <button class="secondary" onclick="changeWeek(-1)">Prethodna</button>
        <button class="secondary" onclick="changeWeek(1)">Sledeća</button>
      </div>
      <div id="weekLabel" class="week-label"></div>
    </div>

    <div id="adminButtons" class="card hidden">
      <div class="nav">
        <button class="green" onclick="showSection('companySection')">Dodaj kompaniju</button>
        <button class="orange" onclick="showSection('tourSection')">Unos / izmena tura</button>
      </div>
    </div>

    <div id="companySection" class="card hidden">
      <h2>Dodaj kompaniju</h2>
      <input id="companyName" placeholder="Naziv kompanije" />
      <button onclick="addCompany()">Sačuvaj kompaniju</button>

      <h3>Postojeće kompanije</h3>
      <div id="companyList"></div>
    </div>

    <div id="tourSection" class="card hidden">
      <h2 id="tourFormTitle">Unos / izmena tura</h2>

      <div id="formStatus" class="status-box">
        Izaberite kompaniju i datum. Ako postoji tura za taj dan, biće automatski učitana.
      </div>

      <input id="editRow" type="hidden" />

      <select id="tourCompany" onchange="findTourForSelectedDate()"></select>
      <input id="tourDate" type="date" onchange="findTourForSelectedDate()" />
      <input id="tourCount" type="number" placeholder="Broj tura" />
      <input id="tourPrice" type="number" placeholder="Cena po turi u dinarima" />

      <button id="saveTourBtn" onclick="saveTour()">Sačuvaj turu</button>
      <button id="cancelEditBtn" class="secondary hidden" onclick="cancelEdit()">Otkaži izmenu</button>
    </div>

    <div class="card">
      <h2>Pregled tura</h2>
      <div id="tourList"></div>
      <div id="totalBox" class="total-box">Ukupno: 0 RSD</div>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx8NayFQk1zsnIiLCcFDSDmJGuXTZUcL8R1kq_usEwVEkrDwy50QTjo6JDXFibYvIFI/exec";

    let weekOffset = 0;
    let loggedIn = localStorage.getItem("loggedIn") === "yes";
    let currentTours = [];

    document.addEventListener("DOMContentLoaded", () => {
      updateLoginView();
      loadData();
    });

    function money(value) {
      return `${Number(value || 0).toLocaleString("sr-RS")} RSD`;
    }

    function openLogin() {
      document.getElementById("loginBox").classList.toggle("hidden");
    }

    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        alert("Unesite username i password");
        return;
      }

      const res = await fetch(`${API_URL}?action=login&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&v=${Date.now()}`);
      const data = await res.json();

      if (data.success) {
        localStorage.setItem("loggedIn", "yes");
        loggedIn = true;
        document.getElementById("loginBox").classList.add("hidden");
        updateLoginView();
        loadData();
      } else {
        alert(data.message || "Login nije uspeo");
      }
    }

    function logout() {
      localStorage.removeItem("loggedIn");
      loggedIn = false;

      document.getElementById("companySection").classList.add("hidden");
      document.getElementById("tourSection").classList.add("hidden");

      cancelEdit();
      updateLoginView();
      loadData();
    }

    function updateLoginView() {
      if (loggedIn) {
        document.getElementById("loginBtn").classList.add("hidden");
        document.getElementById("logoutBtn").classList.remove("hidden");
        document.getElementById("adminButtons").classList.remove("hidden");
      } else {
        document.getElementById("loginBtn").classList.remove("hidden");
        document.getElementById("logoutBtn").classList.add("hidden");
        document.getElementById("adminButtons").classList.add("hidden");
      }
    }

    function showSection(id) {
      document.getElementById("companySection").classList.add("hidden");
      document.getElementById("tourSection").classList.add("hidden");
      document.getElementById(id).classList.remove("hidden");

      if (id === "tourSection") {
        if (!document.getElementById("tourDate").value) {
          document.getElementById("tourDate").value = todayDate();
        }
        findTourForSelectedDate();
      }
    }

    function todayDate() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    async function addCompany() {
      if (!loggedIn) return alert("Morate biti ulogovani");

      const company = document.getElementById("companyName").value.trim();

      if (!company) {
        alert("Unesite naziv kompanije");
        return;
      }

      const exists = Array.from(document.getElementById("tourCompany").options)
        .some(option => option.value.toLowerCase() === company.toLowerCase());

      if (exists) {
        alert("Ova kompanija već postoji");
        return;
      }

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "addCompany",
            company: company
          })
        });

        const data = await res.json();

        if (data.success) {
          document.getElementById("companyName").value = "";
          alert("Kompanija je sačuvana");
          loadData();
        } else {
          alert("Greška: " + data.message);
        }

      } catch (err) {
        alert("Greška pri čuvanju: " + err.message);
      }
    }

    function findTourForSelectedDate() {
      if (!loggedIn) return;

      const company = document.getElementById("tourCompany").value;
      const date = document.getElementById("tourDate").value;

      if (!company || !date) return;

      const found = currentTours.find(t =>
        String(t.company).trim().toLowerCase() === String(company).trim().toLowerCase() &&
        String(t.date).trim() === String(date).trim()
      );

      if (found) {
        document.getElementById("editRow").value = found.row || found.rowNumber || "";
        document.getElementById("tourCount").value = found.tours || "";
        document.getElementById("tourPrice").value = found.price || "";

        document.getElementById("tourFormTitle").innerText = "Izmena postojeće ture";
        document.getElementById("saveTourBtn").innerText = "Sačuvaj izmenu";
        document.getElementById("cancelEditBtn").classList.remove("hidden");
        document.getElementById("formStatus").innerText = "Pronađena je postojeća tura za izabrani datum. Možete je izmeniti.";
      } else {
        document.getElementById("editRow").value = "";
        document.getElementById("tourCount").value = "";
        document.getElementById("tourPrice").value = "";

        document.getElementById("tourFormTitle").innerText = "Unos nove ture";
        document.getElementById("saveTourBtn").innerText = "Sačuvaj novu turu";
        document.getElementById("cancelEditBtn").classList.add("hidden");
        document.getElementById("formStatus").innerText = "Nema ture za izabrani datum. Možete uneti novu.";
      }
    }

    async function saveTour() {
      if (!loggedIn) return alert("Morate biti ulogovani");

      const editRow = document.getElementById("editRow").value;
      const company = document.getElementById("tourCompany").value;
      const date = document.getElementById("tourDate").value;
      const tours = document.getElementById("tourCount").value;
      const price = document.getElementById("tourPrice").value;

      if (!company || !date || !tours || price === "") {
        alert("Popunite kompaniju, datum, broj tura i cenu");
        return;
      }

      const action = editRow ? "updateTour" : "addTour";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: action,
            row: editRow,
            company: company,
            date: date,
            tours: tours,
            price: price
          })
        });

        const data = await res.json();

        if (data.success) {
          alert(editRow ? "Tura je izmenjena" : "Tura je sačuvana");
          await loadData();
          findTourForSelectedDate();
        } else {
          alert("Greška: " + data.message);
        }

      } catch (err) {
        alert("Greška pri čuvanju ture: " + err.message);
      }
    }

    function startEditTour(row, company, date, tours, price) {
      if (!loggedIn) return alert("Morate biti ulogovani");

      showSection("tourSection");

      document.getElementById("editRow").value = row;
      document.getElementById("tourCompany").value = company;
      document.getElementById("tourDate").value = date;
      document.getElementById("tourCount").value = tours;
      document.getElementById("tourPrice").value = price;

      document.getElementById("tourFormTitle").innerText = "Izmena postojeće ture";
      document.getElementById("saveTourBtn").innerText = "Sačuvaj izmenu";
      document.getElementById("cancelEditBtn").classList.remove("hidden");
      document.getElementById("formStatus").innerText = "Menjate izabranu turu.";

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function cancelEdit() {
      document.getElementById("editRow").value = "";
      document.getElementById("tourCount").value = "";
      document.getElementById("tourPrice").value = "";

      document.getElementById("tourFormTitle").innerText = "Unos / izmena tura";
      document.getElementById("saveTourBtn").innerText = "Sačuvaj turu";
      document.getElementById("cancelEditBtn").classList.add("hidden");
      document.getElementById("formStatus").innerText = "Izaberite kompaniju i datum. Ako postoji tura za taj dan, biće automatski učitana.";
    }

    async function deleteTour(row) {
      if (!loggedIn) return alert("Morate biti ulogovani");

      if (!confirm("Da li ste sigurni da želite da obrišete ovu turu?")) return;

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "deleteTour",
            row: row
          })
        });

        const data = await res.json();

        if (data.success) {
          alert("Tura je obrisana");
          await loadData();
          cancelEdit();
        } else {
          alert("Greška: " + data.message);
        }

      } catch (err) {
        alert("Greška pri brisanju: " + err.message);
      }
    }

    async function loadData() {
      try {
        const res = await fetch(`${API_URL}?action=getData&weekOffset=${weekOffset}&v=${Date.now()}`);
        const data = await res.json();

        if (!data.success) {
          alert("Greška: " + data.message);
          return;
        }

        currentTours = data.tours || [];

        document.getElementById("weekLabel").innerText =
          `${data.weekStart} do ${data.weekEnd}`;

        const select = document.getElementById("tourCompany");
        select.innerHTML = "";

        data.companies.forEach(company => {
          if (company) {
            const option = document.createElement("option");
            option.value = company;
            option.textContent = company;
            select.appendChild(option);
          }
        });

        const companyList = document.getElementById("companyList");
        if (companyList) {
          companyList.innerHTML = "";

          if (data.companies.length === 0) {
            companyList.innerHTML = `<p class="small-text">Nema unetih kompanija.</p>`;
          }

          data.companies.forEach(company => {
            companyList.innerHTML += `<div class="company-item">${company}</div>`;
          });
        }

        const list = document.getElementById("tourList");
        list.innerHTML = "";

        let total = 0;

        if (!data.tours || data.tours.length === 0) {
          list.innerHTML = `<p class="small-text">Nema unetih tura za ovu nedelju.</p>`;
          document.getElementById("totalBox").innerText = `Ukupno: 0 RSD`;
          return;
        }

        const grouped = {};

        data.tours.forEach(t => {
          const company = t.company;
          const date = t.date || "Bez datuma";

          if (!grouped[company]) {
            grouped[company] = {
              company: company,
              tours: 0,
              total: 0,
              days: {}
            };
          }

          grouped[company].tours += Number(t.tours || 0);
          grouped[company].total += Number(t.total || 0);

          if (!grouped[company].days[date]) {
            grouped[company].days[date] = [];
          }

          grouped[company].days[date].push(t);
        });

        Object.values(grouped)

  .sort((a, b) => Number(b.tours || 0) - Number(a.tours || 0))

  .forEach((companyData, index) => {
          total += Number(companyData.total || 0);

          let daysHtml = "";

          Object.keys(companyData.days).sort().forEach(day => {
            let dayTours = 0;
            let dayTotal = 0;
            let rowsHtml = "";

            companyData.days[day].forEach(t => {
              dayTours += Number(t.tours || 0);
              dayTotal += Number(t.total || 0);

              const row = t.row || t.rowNumber || "";

              rowsHtml += `
                <div class="day-row">
                  <div class="day-head">
                    <span>${t.tours} tura × ${money(t.price)}</span>
                    <strong>${money(t.total)}</strong>
                  </div>

                  ${loggedIn ? `
                    <div class="admin-actions">
                      <button class="edit-btn" onclick="event.stopPropagation(); startEditTour('${row}', '${escapeText(t.company)}', '${t.date}', '${t.tours}', '${t.price}')">Edit</button>
                      <button class="delete-btn" onclick="event.stopPropagation(); deleteTour('${row}')">Delete</button>
                    </div>
                  ` : ""}
                </div>
              `;
            });

            daysHtml += `
              <div class="day-row">
                <div class="day-head">
                  <span>${day}</span>
                  <strong>${dayTours} tura / ${money(dayTotal)}</strong>
                </div>
                ${rowsHtml}
              </div>
            `;
          });

          list.innerHTML += `
            <div class="tour-item clickable" onclick="toggleDetails('details-${index}')">
              <div class="tour-company">${companyData.company}</div>

              <div class="tour-details">
                Ukupan broj tura: ${companyData.tours}<br>
                Ukupno za kompaniju: ${money(companyData.total)}<br><br>
                <small>Kliknite za detalje ▼</small>
              </div>

              <div id="details-${index}" class="company-details hidden">
                ${daysHtml}
              </div>
            </div>
          `;
        });

        document.getElementById("totalBox").innerText = `Ukupno: ${money(total)}`;

      } catch (err) {
        alert("Greška pri učitavanju: " + err.message);
      }
    }

    function toggleDetails(id) {
      document.getElementById(id).classList.toggle("hidden");
    }

    function changeWeek(direction) {
      weekOffset += direction;
      cancelEdit();
      loadData();
    }

    function escapeText(text) {
      return String(text || "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
